<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASK APP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:420px;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:10px;
  margin:10px 0;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:#0a84ff;
  color:white;
  font-weight:bold;
}

.small-btn{
  width:48%;
}

.row{
  display:flex;
  gap:4%;
}

.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="app">

<h2>📱 TASK APP</h2>

<!-- 🔔 NOTIFICATIONS -->
<div class="card">
  <button onclick="enableNotifications()">🔔 Включи известия</button>
</div>

<!-- ➕ ADD TASK -->
<div class="card">
  <input id="taskText" placeholder="Задача">
  <input id="taskTime" type="time">
  <button onclick="addTask()">➕ Добави задача</button>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

/* 🔔 NOTIFICATIONS */
function enableNotifications(){
  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      alert("✔ Известията са включени");
    }
  });
}

/* ➕ ADD */
function addTask(){
  let text = document.getElementById("taskText").value;
  let time = document.getElementById("taskTime").value;

  if(!text || !time) return alert("Попълни всичко");

  tasks.push({text,time,done:false});
  save();
  render();
}

/* 💾 SAVE */
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

/* 🗑 DELETE */
function del(i){
  tasks.splice(i,1);
  save();
  render();
}

/* ✅ DONE */
function done(i){
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

/* 📱 RENDER */
function render(){
  let list = document.getElementById("list");
  list.innerHTML="";

  tasks.forEach((t,i)=>{
    let div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div>
        <b>${t.text}</b><br>
        ⏰ ${t.time} ${t.done ? "✔" : ""}
      </div>

      <div class="row">
        <button class="small-btn" onclick="done(${i})">✔</button>
        <button class="small-btn" onclick="del(${i})">🗑</button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* ⏰ AUTO CHECK TIME */
setInterval(()=>{
  let now = new Date();
  let h = String(now.getHours()).padStart(2,'0');
  let m = String(now.getMinutes()).padStart(2,'0');
  let current = h+":"+m;

  tasks.forEach(t=>{
    if(t.time === current && !t.done){
      if(Notification.permission==="granted"){
        new Notification("⏰ ЗАДАЧА",{
          body:t.text
        });
      }
    }
  });

},60000);

render();

</script>

</body>
</html>
