<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASK</title>

<!-- 🔔 OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "d929255f-b46d-4c5f-9e92-d6fa3de2cc73",
    notifyButton: { enable: true },
    allowLocalhostAsSecureOrigin: true
  });
});
</script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:420px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  text-align:center;
  padding:15px;
  font-size:20px;
}

.page{display:none;padding:12px;flex:1;}
.active{display:block;}

.card{
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:15px;
  margin:8px 0;
}

input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0a84ff;
  color:white;
}

.task-actions{
  display:flex;
  gap:5px;
}

.task-actions button{
  flex:1;
  font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<header>📱 TASK</header>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
  <input id="taskText" placeholder="Задача">
  <input id="taskTime" type="time">
  <button onclick="addTask()">Добави</button>
</div>

<div id="list"></div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

/* ADD TASK */
function addTask(){
  let text=document.getElementById("taskText").value;
  let time=document.getElementById("taskTime").value;

  if(!text || !time) return;

  tasks.push({text,time});
  save();
  render();
}

/* SAVE */
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

/* RENDER */
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  tasks.forEach((t,i)=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      📝 ${t.text}<br>⏰ ${t.time}
      <div class="task-actions">
        <button onclick="done(${i})">✅ Готово</button>
        <button onclick="del(${i})">🗑 Изтрий</button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* DONE */
function done(i){
  tasks.splice(i,1);
  save();
  render();
}

/* DELETE */
function del(i){
  tasks.splice(i,1);
  save();
  render();
}

/* 🔔 AUTO NOTIFICATIONS (по час) */
setInterval(()=>{
  let now = new Date();
  let h = String(now.getHours()).padStart(2,'0');
  let m = String(now.getMinutes()).padStart(2,'0');
  let current = h+":"+m;

  tasks.forEach(t=>{
    if(t.time === current){
      
      // browser notification
      if(Notification.permission === "granted"){
        new Notification("⏰ TASK", {
          body: t.text
        });
      }

      // OneSignal notification (локално тригерване)
      if(window.OneSignal){
        OneSignalDeferred.push(function(OneSignal){
          OneSignal.sendSelfNotification(
            "⏰ TASK",
            t.text,
            null
          );
        });
      }
    }
  });

},60000);

/* ASK PERMISSION */
Notification.requestPermission();

render();

</script>

</div>
</body>
</html>
